    <style>

        .placeholder-device {
            width: 140px;

            background: #fff;

<script type="text/markdown" id="content">
<div class="hero">
  <h1>Room Customiser</h1>
  <p class="hero-subtitle">Designing a scalable preference system that put guests in control of their stay — and helped partners prepare before check-in.</p>
</div>

<h2><span class="eyebrow">Overview</span>Summary</h2>

**Problem:** Guests could only discover room preferences at the final booking step, and partners had no way to process requests at scale, limiting the feature's reach and impact.

**My role:** I delivered a rapid first iteration, and after positive A/B results, developed a longer-term solution letting guests customise their room, explore available options, and review their choices.

**Impact:** ***The result: A foundational step for our team and beyond.***

<h2><span class="eyebrow">Context</span>What are guest preferences?</h2>

Preferences are non-guaranteed customisations guests can request for their stay. Some apply at the room level (such as bed type or floor) while others apply at the property level, like check-in time or dietary needs. While not contractually guaranteed, they're a key driver of guest satisfaction.

<div class="flow">
  <div class="flow-step">Location selection</div>
  <span>→</span>
  <div class="flow-step">Hotel Selection</div>
  <span>→</span>
  <div class="flow-step">Room Selection</div>
  <span>→</span>
  <div class="flow-step">Check-out</div>
  <span>→</span>
  <div class="flow-step flow-step--bold">State a preference</div>
  <span>→</span>
  <div class="flow-step">Payment</div>
</div>

<h2><span class="eyebrow">Context</span>What we knew going in</h2>

Before we started designing the room customization system, we needed to have a clear understanding of what was working and what wasn't. For that, we conducted a comprehensive audit of existing features and user feedback.

<div class="context-grid">
  <div class="context-grid-header">What was working</div>
  <div class="context-grid-header">What wasn't working</div>

  <div class="context-grid-cell"><strong>Guests</strong> felt more in control by expressing needs in advance, increasing trust and satisfaction.</div>
  <div class="context-grid-cell"><strong>Guests</strong> could only discover preferences at the final booking step, entering requests in a free-text field — especially cumbersome on mobile.</div>

  <div class="context-grid-cell"><strong>Partners</strong> who honored preferences saw a +1.3 uplift in review scores, fewer cancellations, and better pre-check-in preparedness.</div>
  <div class="context-grid-cell"><strong>Partners</strong> had to review and respond to each request individually, with no scalable way to handle recurring or common preferences.</div>

  <div class="context-grid-cell"><strong>Booking.com</strong> saw higher engagement and incremental revenue as more preference options became available.</div>
  <div class="context-grid-cell"><strong>Other teams</strong> wanted earlier access to preferences in the guest journey, with no existing way to support cross-team integration.</div>
</div>

<div class="soft-panel">
<h2><span class="eyebrow">Goal</span>My goal as a designer</h2>

**Design a structured and scalable preference system that:**

- Improved discoverability and reduced friction for guests
- Minimised manual effort for partners
- Transformed free-text requests into structured, actionable data
- Enabled automation and cross-team integrations
- Scaled across markets, property types, and future expansions
</div>

<h2><span class="eyebrow">Approach</span>The Plan</h2>

We moved preferences into the Room Selection flow to test whether more guests would engage with them. As we shifted from free-text to structured options, we started with a single preference to validate the approach.

<div class="steps-row">
  <div class="step-col">
    <div class="placeholder">[Image]</div>
    <strong class="step-title">Moving customisation to Room selection</strong>
    <p>We moved the preference step from checkout into Room Selection, starting with a single binary choice to validate engagement.</p>
    <div class="metrics">
      <div class="metric"><span class="metric-value">[+X%]</span><span class="metric-label">Preference engagement</span></div>
      <div class="metric"><span class="metric-value">[−X%]</span><span class="metric-label">Drop-off at checkout</span></div>
    </div>
  </div>
  <div class="step-col">
    <div class="placeholder">[Image]</div>
    <strong class="step-title">Adding bed preferences in the room card</strong>
    <p>We embedded the bed preference toggle directly in the room card, so guests could act on it without leaving the selection flow.</p>
    <div class="metrics">
      <div class="metric"><span class="metric-value">[+X%]</span><span class="metric-label">Bed preference selections</span></div>
      <div class="metric"><span class="metric-value">[+X%]</span><span class="metric-label">Room card interactions</span></div>
    </div>
  </div>
  <div class="step-col">
    <div class="placeholder">[Image]</div>
    <strong class="step-title">Improving Room Card information architecture</strong>
    <p>We reorganised the card to surface room type, bed config, and amenities first, making preferences a natural part of the choice.</p>
    <div class="metrics">
      <div class="metric"><span class="metric-value">[+X%]</span><span class="metric-label">Task completion rate</span></div>
      <div class="metric"><span class="metric-value">[+X pts]</span><span class="metric-label">Usability score</span></div>
    </div>
  </div>
</div>

<div class="blue-panel">
  <h2><span class="eyebrow">Challenge</span>The challenge: more options, less noise</h2>
  <p>A single preference validated the model, but the real goal was to surface a broader range without overwhelming guests or cluttering the room selection experience. More options meant more complexity. The question became: how do we scale the preference surface while keeping the interaction feel lightweight?</p>
</div>

<h2><span class="eyebrow">Exploration</span>Design explorations</h2>

<div class="steps-row">
  <div class="step-col">
    <div class="placeholder">[Image]</div>
    <strong class="step-title">Progressive disclosure</strong>
    <p>Show one preference at a time, expanding only when the guest engages.</p>
  </div>
  <div class="step-col">
    <div class="placeholder">[Image]</div>
    <strong class="step-title">Summary row</strong>
    <p>A compact row at the bottom of the card summarising selected preferences with quick-edit access.</p>
  </div>
  <div class="step-col">
    <div class="placeholder">[Image]</div>
    <strong class="step-title">Expandable panel</strong>
    <p>An opt-in panel guests can open to set multiple preferences at once, without blocking the main flow.</p>
  </div>
</div>

<div class="blue-panel">
  <h2><span class="eyebrow">Insight</span>A new screen is needed</h2>
  <p>After testing multiple approaches within the room card, it became clear that a dedicated screen was the right path: one that could scale the preference experience without compromising the room selection flow.</p>
</div>

<h2><span class="eyebrow">Concepts</span>Two designs: Bottom sheet vs Full-screen</h2>

<div class="steps-row">
  <div class="step-col">
    <div class="placeholder">[Screen]</div>
    <strong class="step-title">Bottom sheet</strong>
    <p>A lightweight overlay that keeps guests in context. Lower commitment, easier to dismiss, and minimal disruption to the room selection flow.</p>
  </div>
  <div class="step-col">
    <div class="placeholder">[Screen]</div>
    <strong class="step-title">Full-screen</strong>
    <p>A dedicated space that signals importance. More room to present options, educate guests, and support confident decision-making.</p>
  </div>
</div>

<h2><span class="eyebrow">Collaboration</span>Team critique</h2>

We shared both directions with the wider design team to pressure-test assumptions and surface blind spots before investing further.

<h2><span class="eyebrow">Research</span>Testing with users</h2>

We ran usability sessions to observe how guests interacted with each direction, paying close attention to comprehension, hesitation points, and completion rates.

<h2><span class="eyebrow">Results</span>A/B results: round 1</h2>

<div class="slide-cols">
  <div class="mobile-design">
    <div class="placeholder">[Screen]</div>
    <div>
      <strong>Bottom sheet</strong>
      <p class="results">[+X% preference selection rate]<br>[−X% drop-off vs. control]</p>
    </div>
  </div>
  <div class="mobile-design">
    <div class="placeholder">[Screen]</div>
    <div>
      <strong>Full-screen</strong>
      <p class="results">[+X% preference selection rate]<br>[−X% drop-off vs. control]</p>
    </div>
  </div>
</div>

<h2><span class="eyebrow">Retrospective</span>What went well, what could be improved, and next steps.</h2>

<div class="slide-cols">
  <div class="col">
    The first iteration shipped quickly and validated the core hypothesis: moving preferences to Room Selection drove meaningful engagement. The shift from free-text to structured data was a foundational win. What we learned: guests wanted more context when making preference choices, and the system needed to scale beyond a single option. These insights directly shaped the second experiment.
  </div>
  <div class="col-media">
    <div class="placeholder">[Image]</div>
    <span class="caption">[Retrospective summary, key learnings]</span>
  </div>
</div>

<h2><span class="eyebrow">Iteration</span>Second experiment: Mixing the best of both worlds</h2>

<div class="slide-cols">
  <div class="mobile-design">
    <div class="placeholder">[Screen]</div>
    <div>
      <strong>Combined approach</strong>
      <p class="results">[+X% preference selection rate]<br>[+X% guest satisfaction score]</p>
    </div>
  </div>
  <div class="mobile-design">
    <div class="placeholder">[Screen]</div>
    <div>
      <strong>Refined variant</strong>
      <p class="results">[+X% preference selection rate]<br>[+X% partner preparedness score]</p>
    </div>
  </div>
</div>
</script>


<div id="output"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    const raw = document.getElementById('content').textContent;
    document.getElementById('output').innerHTML = marked.parse(raw);

    // Scroll fade-in
    const targets = ['h2', '.slide-cols', '.slide-cols-tight', '.steps-row', '.blue-panel', '.flow'];
    document.querySelectorAll(targets.join(',')).forEach(el => el.classList.add('fade-in'));

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
